<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Online Job Application Form</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #dbeafe, #f8fafc);
            min-height: 100vh;
            padding: 40px 15px;
            color: #333;
        }

        .container {
            max-width: 900px;
            margin: auto;
            background: white;
            border-radius: 16px;
            padding: 35px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
        }

        .title {
            text-align: center;
            margin-bottom: 35px;
        }

        .title h1 {
            color: #0f172a;
            font-size: 36px;
            margin-bottom: 10px;
        }

        .title p {
            color: #64748b;
            font-size: 15px;
        }

        fieldset {
            border: none;
            margin-bottom: 30px;
            background: #f8fafc;
            padding: 25px;
            border-radius: 12px;
        }

        legend {
            font-size: 20px;
            font-weight: bold;
            color: #2563eb;
            padding: 0 10px;
            margin-bottom: 15px;
        }

        .form-group {
            margin-bottom: 18px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            color: #1e293b;
        }

        input[type="text"],
        input[type="email"],
        input[type="tel"],
        input[type="date"],
        input[type="file"],
        select,
        textarea {
            width: 100%;
            padding: 12px 14px;
            border: 1px solid #cbd5e1;
            border-radius: 8px;
            font-size: 15px;
            transition: 0.3s;
            background: white;
        }

        input:focus,
        select:focus,
        textarea:focus {
            outline: none;
            border-color: #2563eb;
            box-shadow: 0 0 0 4px rgba(37, 99, 235, 0.15);
        }

        textarea {
            min-height: 120px;
            resize: vertical;
        }

        .radio-group,
        .checkbox-group {
            display: flex;
            flex-wrap: wrap;
            gap: 20px;
            margin-top: 10px;
        }

        .radio-group label,
        .checkbox-group label {
            display: flex;
            align-items: center;
            gap: 8px;
            font-weight: normal;
            cursor: pointer;
        }

        .button-group {
            display: flex;
            gap: 15px;
            justify-content: center;
            margin-top: 20px;
        }

        button,
        input[type="reset"] {
            padding: 14px 28px;
            border: none;
            border-radius: 8px;
            font-size: 15px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
        }

        button {
            background: #2563eb;
            color: white;
        }

        button:hover {
            background: #1d4ed8;
            transform: translateY(-2px);
        }

        input[type="reset"] {
            background: #e2e8f0;
            color: #1e293b;
        }

        input[type="reset"]:hover {
            background: #cbd5e1;
            transform: translateY(-2px);
        }

        .two-column {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
        }

        @media (max-width: 700px) {
            .two-column {
                grid-template-columns: 1fr;
            }

            .container {
                padding: 20px;
            }

            .title h1 {
                font-size: 28px;
            }
        }
    </style>
</head>

<body>

    <div class="container">

        <div class="title">
            <h1>Online Job Application Form</h1>
            <p>Please fill out all required information carefully.</p>
        </div>

        <form action="#" method="post">

            <!-- Personal Information -->
            <fieldset>
                <legend>Personal Information</legend>

                <div class="two-column">

                    <div class="form-group">
                        <label for="fullname">Full Name</label>
                        <input type="text" id="fullname" name="fname" required>
                    </div>

                    <div class="form-group">
                        <label for="nid">NID Number</label>
                        <input type="text" id="nid" name="nid" required>
                    </div>

                    <div class="form-group">
                        <label for="email">Email Address</label>
                        <input type="email" id="email" name="email" required>
                    </div>

                    <div class="form-group">
                        <label for="phone">Phone Number</label>
                        <input type="tel" id="phone" name="phone" required>
                    </div>

                    <div class="form-group">
                        <label for="dob">Date of Birth</label>
                        <input type="date" id="dob" name="dob" required>
                    </div>

                </div>

                <div class="form-group">
                    <label>Gender</label>

                    <div class="radio-group">
                        <label>
                            <input type="radio" name="gender" value="male">
                            Male
                        </label>

                        <label>
                            <input type="radio" name="gender" value="female">
                            Female
                        </label>

                        <label>
                            <input type="radio" name="gender" value="other">
                            Other
                        </label>
                    </div>
                </div>

            </fieldset>

            <!-- Job Information -->
            <fieldset>
                <legend>Job Information</legend>

                <div class="two-column">

                    <div class="form-group">
                        <label for="position">Position Applied For</label>

                        <select id="position" name="position">
                            <option>Software Developer</option>
                            <option>Web Designer</option>
                            <option>Network Engineer</option>
                            <option>Database Administrator</option>
                            <option>IT Support Officer</option>
                        </select>
                    </div>

                    <div class="form-group">
                        <label for="experience">Experience Level</label>

                        <select id="experience" name="experience">
                            <option>Fresher</option>
                            <option>1-2 Years</option>
                            <option>3-5 Years</option>
                            <option>More than 5 Years</option>
                        </select>
                    </div>

                </div>

                <div class="form-group">
                    <label>Skills</label>

                    <div class="checkbox-group">

                        <label>
                            <input type="checkbox" name="skill" value="html">
                            HTML
                        </label>

                        <label>
                            <input type="checkbox" name="skill" value="css">
                            CSS
                        </label>

                        <label>
                            <input type="checkbox" name="skill" value="js">
                            JavaScript
                        </label>

                        <label>
                            <input type="checkbox" name="skill" value="python">
                            Python
                        </label>

                        <label>
                            <input type="checkbox" name="skill" value="sql">
                            SQL
                        </label>

                    </div>
                </div>

            </fieldset>

            <!-- Educational Information -->
            <fieldset>
                <legend>Educational Information</legend>

                <div class="two-column">

                    <div class="form-group">
                        <label for="hq">Highest Qualification</label>
                        <input type="text" id="hq" name="hq" required>
                    </div>

                    <div class="form-group">
                        <label for="uni">University / College Name</label>
                        <input type="text" id="uni" name="uni" required>
                    </div>

                    <div class="form-group">
                        <label for="year">Graduation Year</label>
                        <input type="date" id="year" name="year" required>
                    </div>

                </div>

            </fieldset>

            <!-- Additional Information -->
            <fieldset>
                <legend>Additional Information</legend>

                <div class="form-group">
                    <label for="file">Upload Resume / CV</label>
                    <input type="file" id="file" name="file" required>
                </div>

                <div class="form-group">
                    <label for="cvl">Cover Letter</label>
                    <textarea id="cvl" name="cvl" maxlength="300" required></textarea>
                </div>

                <div class="form-group">
                    <label for="address">Current Address</label>
                    <input type="text" id="address" name="address" required>
                </div>

            </fieldset>

            <!-- Buttons -->
            <div class="button-group">
                <button type="submit">Submit Application</button>
                <input type="reset" value="Reset Form">
            </div>

        </form>

    </div>

</body>

</html>
